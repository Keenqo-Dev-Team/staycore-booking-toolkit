<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{BRAND_NAME}} — Réservation directe</title>
    <meta name="description" content="{{BRAND_TAGLINE}}" />

    <!-- Google Analytics 4 with Consent Mode v2 (RGPD).
         Tracking is BLOCKED by default. CookieConsent.tsx unlocks it on user consent. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { window.dataLayer.push(arguments); }
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted',
        wait_for_update: 500,
      });
      gtag('js', new Date());
      // {{GA4_MEASUREMENT_ID}} → replace with your own G-XXXXXXXXXX or remove the block.
      // gtag('config', '{{GA4_MEASUREMENT_ID}}');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
